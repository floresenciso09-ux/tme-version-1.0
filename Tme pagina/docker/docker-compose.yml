version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tme
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: tme
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - tme-network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgres://tme:change-me@postgres:5432/tme
      JWT_SECRET: moon-secret
      NODE_ENV: development
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    networks:
      - tme-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - tme-network

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tme-network

volumes:
  postgres-data:

networks:
  tme-network:
    driver: bridge
